name: Release

on:
  push:
    tags:
      - "[vV]*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example V2.0 or v2.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows executable
    runs-on: windows-latest

    env:
      APP_NAME: xgen-waveform-viewer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "RELEASE_VERSION=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "RELEASE_VERSION=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify imports
        run: python -m compileall src main.py

      - name: Build executable
        run: pyinstaller xgen-waveform-viewer.spec --clean --noconfirm

      - name: Package release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive `
            -Path "dist/$env:APP_NAME.exe", "README.md" `
            -DestinationPath "release/$env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip" `
            -Force
          Get-FileHash "release/$env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path $_.Path -Leaf)" } |
            Out-File "release/$env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip.sha256" -Encoding ascii

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @"
          ## xgen-waveform-viewer $env:RELEASE_VERSION

          Windows x64 executable built by GitHub Actions.

          Assets:
          - $env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip
          - SHA256 checksum
          "@

          gh release view "$env:RELEASE_VERSION" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_VERSION" `
              "release/$env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip" `
              "release/$env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip.sha256" `
              --title "$env:RELEASE_VERSION" `
              --notes "$notes"
          } else {
            gh release upload "$env:RELEASE_VERSION" `
              "release/$env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip" `
              "release/$env:APP_NAME-$env:RELEASE_VERSION-windows-x64.zip.sha256" `
              --clobber
          }
